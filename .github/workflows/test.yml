name: Test Code Quality

on:
  push:
    branches:
      - main
    paths:
      - 'SheetFlow.AppScript/**'
      - '.github/workflows/test.yml'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'SheetFlow.AppScript/**'
      - '.github/workflows/test.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  quality-check:
    name: Code Quality & Test Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate project structure
        run: |
          echo "Checking project structure..."

          required_dirs=(
            "SheetFlow.AppScript"
            "SheetFlow.AppScript/src"
            "SheetFlow.AppScript/test"
            "SheetFlow.FlutterMobile"
          )

          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "Missing directory: $dir"
              exit 1
            fi
          done

          required_files=(
            "SheetFlow.AppScript/appsscript.json"
            "SheetFlow.AppScript/.clasp.json.example"
            "SheetFlow.AppScript/src/config.gs"
            "SheetFlow.AppScript/src/utils.gs"
            "SheetFlow.AppScript/src/sort.service.gs"
            "SheetFlow.AppScript/src/format.service.gs"
            "SheetFlow.AppScript/src/backlog.service.gs"
            "SheetFlow.AppScript/src/dailyreport.service.gs"
            "SheetFlow.AppScript/src/api.service.gs"
            "SheetFlow.AppScript/src/main.gs"
          )

          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing file: $file"
              exit 1
            fi
          done

      - name: Validate test files presence
        run: |
          echo "Checking test file structure..."

          test_files=(
            "SheetFlow.AppScript/test/test.runner.gs"
            "SheetFlow.AppScript/test/sort.service.test.gs"
            "SheetFlow.AppScript/test/border.test.gs"
          )

          for file in "${test_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing test file: $file"
              exit 1
            fi
          done

      - name: Static code analysis
        run: |
          echo "Running static code analysis..."

          syntax_errors=0
          while IFS= read -r file; do
            if ! node -c "$file" 2>/dev/null; then
              echo "Syntax error in: $file"
              syntax_errors=$((syntax_errors + 1))
            fi
          done < <(find SheetFlow.AppScript/src -name "*.gs" | sort)

          if [ "$syntax_errors" -gt 0 ]; then
            echo "Found $syntax_errors syntax errors"
            exit 1
          fi

          if grep -r "console\.log" --include="*.gs" SheetFlow.AppScript/src; then
            echo "Warning: console.log found in production code"
          else
            echo "No console.log in production code"
          fi

          if grep -q "const CONFIG" SheetFlow.AppScript/src/config.gs && grep -q "BACKLOGS\|DAILY" SheetFlow.AppScript/src/config.gs; then
            echo "CONFIG structure valid"
          else
            echo "CONFIG structure issues"
            exit 1
          fi

      - name: Validate .clasp.json.example
        run: |
          if ! jq empty SheetFlow.AppScript/.clasp.json.example >/dev/null 2>&1; then
            echo ".clasp.json.example is not valid JSON"
            exit 1
          fi

          if ! jq -e '.scriptId and .rootDir and .filePushOrder' SheetFlow.AppScript/.clasp.json.example >/dev/null; then
            echo ".clasp.json.example missing required fields"
            exit 1
          fi

      - name: Test execution guidance
        run: |
          echo ""
          echo "MANUAL TEST EXECUTION:"
          echo "1. cd SheetFlow.AppScript"
          echo "2. clasp login"
          echo "3. cp .clasp.json.example .clasp.json"
          echo "4. Update scriptId in .clasp.json"
          echo "5. clasp push"
          echo "6. clasp open"
          echo "7. Run test/test.runner.gs -> runAllTests()"
          echo ""

      - name: Create quality report
        run: |
          {
            echo "## Code Quality Report"
            echo ""
            echo "### Automated Checks Passed"
            echo "- Project structure validated"
            echo "- Test files validated"
            echo "- Source syntax validated"
            echo "- Config files validated"
            echo ""
            echo "### File Structure"
            echo '```'
            find SheetFlow.AppScript -maxdepth 2 \( -name "*.gs" -o -name "*.json" -o -name "*.md" \) | sort
            echo '```'
          } > quality-report.md

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.md
