name: Test Code Quality

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch: # Cho phép chạy manual

jobs:
  quality-check:
    name: Code Quality & Test Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Validate project structure
        run: |
          echo "🔍 Checking project structure..."

          # Check required directories
          if [ ! -d "test" ]; then
            echo "❌ test/ directory missing"
            exit 1
          fi

          # Check required files
          required_files=("config.gs" "utils.gs" "format.service.gs" "backlog.service.gs" "dailyreport.service.gs" "main.gs")
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Production file missing: $file"
              exit 1
            fi
          done
          echo "✅ Production files present"

      - name: Validate test files presence
        run: |
          echo "🔍 Checking test file structure..."

          # Validate test files exist
          test_files=("test/test.runner.gs" "test/sort.service.test.gs" "test/border.test.gs")
          for file in "${test_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ Test file missing: $file"
              exit 1
            else
              echo "✅ Found: $file"
            fi
          done

          echo "✅ All test files present"

      - name: Static code analysis
        run: |
          echo "🔍 Running static code analysis..."

          # Check for basic syntax errors in .gs files (excluding test files)
          echo "Checking syntax..."
          syntax_errors=0
          for file in $(find . -name "*.gs" -not -path "./test/*" -not -path "./.git/*"); do
            if ! node -c "$file" 2>/dev/null; then
              echo "❌ Syntax error in: $file"
              syntax_errors=$((syntax_errors + 1))
            fi
          done

          if [ $syntax_errors -gt 0 ]; then
            echo "❌ Found $syntax_errors syntax errors"
            exit 1
          else
            echo "✅ Syntax check passed"
          fi

          # Check for common issues in production code
          echo "Checking for console.log in production code..."
          if grep -r "console\.log" --include="*.gs" --exclude-dir=test --exclude-dir=.git .; then
            echo "⚠️  Warning: console.log found in production code"
            echo "   Consider removing debug statements before deployment"
          else
            echo "✅ No console.log in production code"
          fi

          # Validate CONFIG structure
          echo "Checking CONFIG structure..."
          if grep -q "const CONFIG" config.gs && grep -q "BACKLOGS\|DAILY" config.gs; then
            echo "✅ CONFIG structure valid"
          else
            echo "❌ CONFIG structure issues"
            exit 1
          fi

      - name: Validate .clasp.json.example
        run: |
          echo "🔍 Validating .clasp.json.example..."

          # Check if it's valid JSON
          if ! jq empty .clasp.json.example 2>/dev/null; then
            echo "❌ .clasp.json.example is not valid JSON"
            exit 1
          fi

          # Check required fields
          if ! jq -e '.scriptId and .filePushOrder' .clasp.json.example >/dev/null; then
            echo "❌ .clasp.json.example missing required fields"
            exit 1
          fi

          echo "✅ .clasp.json.example is valid"

      - name: Test execution guidance
        run: |
          echo ""
          echo "📋 MANUAL TEST EXECUTION REQUIRED:"
          echo ""
          echo "⚠️  IMPORTANT: This CI pipeline does NOT execute tests automatically."
          echo "   Google Apps Script tests must be run manually in the Apps Script environment:"
          echo ""
          echo "   1. Setup local: clasp login && clasp clone <script-id>"
          echo "   2. Push code: clasp push"
          echo "   3. Open editor: clasp open"
          echo "   4. Run tests: test/test.runner.gs → runAllTests()"
          echo "   5. Check logs: View → Executions → logs"
          echo ""
          echo "🔄 For automated testing in future:"
          echo "   - Apps Script API integration"
          echo "   - Headless browser automation"
          echo "   - Node.js unit tests with mocks"
          echo ""

      - name: Create quality report
        run: |
          echo "## Code Quality Report" > quality-report.md
          echo "" >> quality-report.md
          echo "### ✅ Automated Quality Checks Passed" >> quality-report.md
          echo "- Project structure validated" >> quality-report.md
          echo "- Test files structure validated" >> quality-report.md
          echo "- Code syntax checked" >> quality-report.md
          echo "- Production code quality verified" >> quality-report.md
          echo "- Configuration files validated" >> quality-report.md
          echo "" >> quality-report.md
          echo "### 📋 Manual Testing Required" >> quality-report.md
          echo "Execute \`runAllTests()\` in Google Apps Script Editor" >> quality-report.md
          echo "See LOCAL_TEST_GUIDE.md for detailed instructions" >> quality-report.md
          echo "" >> quality-report.md
          echo "### 📁 File Structure" >> quality-report.md
          echo "\`\`\`" >> quality-report.md
          find . -name "*.gs" -not -path "./.git/*" | sort >> quality-report.md
          echo "\`\`\`" >> quality-report.md

      - name: Upload quality report
        uses: actions/upload-artifact@v4
        with:
          name: quality-report
          path: quality-report.md

      - name: Validate code syntax
        run: |
          # Basic syntax check for .gs files
          find . -name "*.gs" -not -path "./test/*" | xargs -I {} node -c {}

      - name: Check for console.log in production code
        run: |
          # Warn if console.log found in production files (not test files)
          if grep -r "console\.log" --include="*.gs" --exclude-dir=test .; then
            echo "⚠️  Warning: console.log found in production code"
            echo "   Consider removing debug statements before deployment"
          else
            echo "✅ No console.log in production code"
          fi