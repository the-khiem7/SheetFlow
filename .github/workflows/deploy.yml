name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'SheetFlow.AppScript/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SheetFlow.AppScript

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          npm install -g @google/clasp
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Setup clasp credentials
        run: |
          echo "Setting up clasp credentials..."
          echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

          if ! jq empty ~/.clasprc.json >/dev/null 2>&1; then
            echo "CLASP_CREDENTIALS is not valid JSON"
            exit 1
          fi

      - name: Generate .clasp.json from template
        run: |
          jq --arg scriptId "${{ secrets.SCRIPT_ID }}" '.scriptId = $scriptId' .clasp.json.example > .clasp.json

          if ! jq empty .clasp.json >/dev/null 2>&1; then
            echo "Generated .clasp.json is invalid JSON"
            exit 1
          fi

      - name: Push to Apps Script
        run: |
          echo "Listing files to push:"
          clasp status

          echo "Pushing to Apps Script..."
          clasp push

      - name: Deploy Web App
        run: |
          if [ -z "${{ secrets.DEPLOYMENT_ID }}" ]; then
            echo "DEPLOYMENT_ID secret is not set"
            exit 1
          fi

          clasp deploy --deploymentId "${{ secrets.DEPLOYMENT_ID }}"

      - name: Validate deployment
        run: |
          if [ -n "${{ secrets.DEPLOY_URL }}" ]; then
            DEPLOY_URL="${{ secrets.DEPLOY_URL }}"
            URL_SOURCE="secret"
          else
            DEPLOY_URL="https://script.google.com/macros/s/${{ secrets.DEPLOYMENT_ID }}/exec"
            URL_SOURCE="derived"
          fi

          HEALTH_PATH="refresh/status"
          RESPONSE=$(curl -s -L -w "HTTPSTATUS:%{http_code}" "$DEPLOY_URL?path=$HEALTH_PATH")
          HTTP_CODE=$(echo "$RESPONSE" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
          BODY=$(echo "$RESPONSE" | sed -e 's/HTTPSTATUS:.*//g')

          echo "Validation URL source: $URL_SOURCE"
          echo "Validation URL: $DEPLOY_URL"
          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" -eq 404 ]; then
            if [ "$URL_SOURCE" = "secret" ]; then
              echo "DEPLOY_URL is invalid: $DEPLOY_URL"
              exit 1
            fi

            echo "::warning::Derived deployment URL returned 404. DEPLOYMENT_ID may not be a usable web app URL segment. Set DEPLOY_URL secret to validate the deployed web app explicitly."
            exit 0
          fi

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "Deployment is accessible"
            echo "Response preview: ${BODY:0:100}..."
          elif [ "$HTTP_CODE" -eq 401 ] || [ "$HTTP_CODE" -eq 403 ]; then
            echo "Deployment exists and requires auth"
          else
            echo "Unexpected response: $HTTP_CODE"
            echo "Response: ${BODY:0:200}..."
          fi

          if [ -n "${{ secrets.API_KEY }}" ]; then
            AUTH_RESPONSE=$(curl -s -L -w "HTTPSTATUS:%{http_code}" \
              "$DEPLOY_URL?path=tasks&X-API-Key=${{ secrets.API_KEY }}")

            AUTH_CODE=$(echo "$AUTH_RESPONSE" | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
            AUTH_BODY=$(echo "$AUTH_RESPONSE" | sed -e 's/HTTPSTATUS:.*//g')

            if [ "$AUTH_CODE" -eq 200 ]; then
              echo "API authentication successful"
              echo "Tasks response: ${AUTH_BODY:0:100}..."
            else
              echo "::warning::API auth test failed ($AUTH_CODE)"
            fi
          else
            echo "API_KEY secret not provided, skipping auth test"
          fi
