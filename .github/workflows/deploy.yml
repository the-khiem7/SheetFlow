name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Setup clasp credentials
        run: echo '${{ secrets.CLASP_CREDENTIALS }}' > ~/.clasprc.json

      - name: Generate .clasp.json from template
        run: sed 's/<YOUR_SCRIPT_ID>/${{ secrets.SCRIPT_ID }}/' .clasp.json.example > .clasp.json

      - name: Push to Apps Script
        run: clasp push
